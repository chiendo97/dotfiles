name: Update flake inputs

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6 AM UTC
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Update flake inputs
        run: nix flake update --flake home-manager/.config/home-manager

      - name: Build home-manager config
        run: |
          nix build home-manager/.config/home-manager#homeConfigurations.cle.activationPackage

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add home-manager/.config/home-manager/flake.lock
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "home-manager: update flake inputs"
          git push
